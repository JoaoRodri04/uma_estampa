<ion-app>
  <ion-menu side="start" menuId="main-menu" contentId="main">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/home" routerDirection="root">
            <ion-icon slot="start" name="home"></ion-icon>
            <ion-label>Home</ion-label>
          </ion-item>
          <ion-item routerLink="/carrinho" routerDirection="root">
            <ion-icon slot="start" name="cart"></ion-icon>
            <ion-label>Carrinho</ion-label>
          </ion-item>
          <ion-item routerLink="/conta" routerDirection="root">
            <ion-icon slot="start" name="person"></ion-icon>
            <ion-label>Conta</ion-label>
          </ion-item>
          <ion-item routerLink="/sobre" routerDirection="root">
            <ion-icon slot="start" name="information-circle"></ion-icon>
            <ion-label>Sobre</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main"></ion-router-outlet>
</ion-app>
