<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Catálogo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-searchbar placeholder="Procurar t-shirts..." (ionInput)="filtrarProdutos($event)"></ion-searchbar>

  <ion-grid>
    <ion-row>
      <ion-col size="6" size-md="4" *ngFor="let produto of produtosFiltrados">
        <ion-card [routerLink]="['/produto-detalhe']" [queryParams]="{ id: produto.id }">
          <img [src]="produto.imagem" />
          <ion-card-header>
            <ion-card-subtitle>{{ produto.categoria }}</ion-card-subtitle>
            <ion-card-title>{{ produto.nome }}</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <p style="font-weight: bold; color: var(--ion-color-primary);">{{ produto.preco | currency:'EUR' }}</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
